version: "3.9"

# Shared env for every Python service so they agree on URIs and the data volume.
x-meridian-env: &meridian-env
  MERIDIAN_MLFLOW_TRACKING_URI: http://mlflow:5000
  MERIDIAN_DATA_DIR: /data

services:
  # --- MLflow tracking server + model registry (sqlite backend, local artifacts) ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5500:5000"          # dashboard: http://localhost:5500

  # --- one-shot baseline training; registers + promotes the first model ---
  trainer:
    build: .
    environment: *meridian-env
    command: python -m meridian.train --reason baseline
    depends_on:
      - mlflow
    volumes:
      - shared_data:/data

  # --- FastAPI model serving ---
  serving:
    build: .
    environment: *meridian-env
    command: uvicorn meridian.serving.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"          # API + /metrics
    depends_on:
      trainer:
        condition: service_completed_successfully
    volumes:
      - shared_data:/data

  # --- Evidently drift monitor + retrain trigger ---
  drift-monitor:
    build: .
    environment: *meridian-env
    command: python -m meridian.drift.monitor
    ports:
      - "8001:8001"          # /metrics (drift gauges)
    depends_on:
      - serving
    volumes:
      - shared_data:/data

  # --- Prometheus: scrapes serving + drift monitor, evaluates alerts ---
  prometheus:
    image: prom/prometheus:latest
    mem_limit: 256m
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"          # http://localhost:9090
    depends_on:
      - serving
      - drift-monitor

  # --- Grafana: pre-provisioned drift + serving dashboard ---
  grafana:
    image: grafana/grafana:latest
    mem_limit: 256m
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"          # http://localhost:3001
    depends_on:
      - prometheus

volumes:
  mlflow_data:
  shared_data:
