global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: serving
    metrics_path: /metrics
    static_configs:
      - targets: ["serving:8000"]

  - job_name: drift-monitor
    metrics_path: /metrics
    static_configs:
      - targets: ["drift-monitor:8001"]
